services:
  # ------------------------------------------------------------------------
  # MINIO - DATA LAKE
  # ------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - datalake

  # ------------------------------------------------------------------------
  # INGEST (PYTHON)
  # ------------------------------------------------------------------------
  ingest:
    build: .
    container_name: ingest
    depends_on:
      - minio
    ports:
      - "8000:8000"  # Porta onde o Prometheus coleta as métricas Silver
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    # run_metrics.py substitui o start_metrics_server.py anterior.
    # Ele sobe o servidor HTTP E executa o pipeline de validação em loop,
    # garantindo que as métricas sempre tenham valores reais para o Prometheus.
    command: python run_metrics.py
    networks:
      - datalake

  # ------------------------------------------------------------------------
  # SPARK MASTER (IMAGEM OFICIAL APACHE)
  # ------------------------------------------------------------------------
  spark-master:
    image: apache/spark:3.5.2
    container_name: spark-master
    command: ["/opt/spark/sbin/start-master.sh"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8080:8080"   # Spark Web UI
      - "7077:7077"   # Spark Cluster Port
    networks:
      - datalake

  # ------------------------------------------------------------------------
  # SPARK WORKER
  # ------------------------------------------------------------------------
  spark-worker:
    image: apache/spark:3.5.2
    container_name: spark-worker
    depends_on:
      - spark-master
    command: ["/opt/spark/sbin/start-worker.sh", "spark://spark-master:7077"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8081:8081"   # Worker UI
    networks:
      - datalake

  # ------------------------------------------------------------------------
  # PREFECT SERVER
  # ------------------------------------------------------------------------
  prefect:
    image: prefecthq/prefect:3.6.15-python3.11
    container_name: prefect
    command: prefect server start --host 0.0.0.0
    environment:
      - PREFECT_API_URL=http://localhost:4200/api
    ports:
      - "4200:4200"
    networks:
      - datalake

  # ------------------------------------------------------------------------
  # PROMETHEUS
  # ------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - datalake
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  # ------------------------------------------------------------------------
  # GRAFANA
  # ------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:12.3.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning  # Dashboards pré-configurados
    depends_on:
      - prometheus
    networks:
      - datalake

  # ------------------------------------------------------------------------
  # JUPYTER NOTEBOOK
  # ------------------------------------------------------------------------
  jupyter:
    build: .
    container_name: jupyter
    depends_on:
      - minio
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''
    ports:
      - "8888:8888"
    networks:
      - datalake

# ------------------------------------------------------------------------
# VOLUMES E REDE
# ------------------------------------------------------------------------

volumes:
  minio_data:
  grafana_data:

networks:
  datalake:
    driver: bridge