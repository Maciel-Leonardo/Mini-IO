
services:
  # ------------------------------------------------------------------------
  # MINIO - DATA LAKE
  # ------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - datalake

  # ------------------------------------------------------------------------
  # INGEST (PYTHON)
  # ------------------------------------------------------------------------
  ingest:
    build: .
    container_name: ingest
    depends_on:
      - minio
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    command: tail -f /dev/null
    networks:
      - datalake

  # ------------------------------------------------------------------------
  # SPARK MASTER (IMAGEM OFICIAL APACHE)
  # ------------------------------------------------------------------------
  spark-master:
    image: apache/spark:3.5.2
    container_name: spark-master
    command: ["/opt/spark/sbin/start-master.sh"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8080:8080"   # Spark Web UI
      - "7077:7077"   # Spark Cluster Port
    networks:
      - datalake

  # ------------------------------------------------------------------------
  # SPARK WORKER
  # ------------------------------------------------------------------------
  spark-worker:
    image: apache/spark:3.5.2
    container_name: spark-worker
    depends_on:
      - spark-master
    command: ["/opt/spark/sbin/start-worker.sh", "spark://spark-master:7077"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8081:8081"   # Worker UI
    networks:
      - datalake

  # ------------------------------------------------------------------------
  # PREFECT SERVER
  # ------------------------------------------------------------------------
  prefect:
    image: prefecthq/prefect:3.6.15-python3.11
    container_name: prefect
    command: prefect server start --host 0.0.0.0
    environment:
      - PREFECT_API_URL=http://localhost:4200/api
    ports:
      - "4200:4200"
    networks:
      - datalake

  # ------------------------------------------------------------------------
  # PROMETHEUS
  # ------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: prometheus
    ports:
      - "9090:9090"
    networks:
      - datalake

  # ------------------------------------------------------------------------
  # GRAFANA
  # ------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:12.3.2
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - datalake
  # ------------------------------------------------------------------------
  # JUPYTER NOTEBOOK
  # ------------------------------------------------------------------------
  jupyter:
    build: .
    container_name: jupyter
    depends_on:
      - minio
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''
    ports:
      - "8888:8888"
    networks:
      - datalake
# ------------------------------------------------------------------------
# VOLUMES E REDE
# ------------------------------------------------------------------------

volumes:
  minio_data:

networks:
  datalake:
    driver: bridge
