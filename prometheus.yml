# prometheus.yml
global:
  scrape_interval: 15s  # Coletar métricas a cada 15 segundos
  evaluation_interval: 15s

scrape_configs:
  # Job para coletar métricas do Silver
  - job_name: 'silver_pipeline'
    static_configs:
      - targets: ['ingest:8000']  # Porta onde silver.py expõe métricas
        labels:
          service: 'silver'
          layer: 'processing'
  
  # Job para coletar métricas do MinIO
  - job_name: 'minio'
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']
        labels:
          service: 'storage'
  
  # Job para coletar métricas do Spark
  - job_name: 'spark'
    static_configs:
      - targets: ['spark-master:8080']
        labels:
          service: 'processing'