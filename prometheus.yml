# prometheus.yml
global:
  scrape_interval: 15s # Intervalo padrão para coletar métricas de todos os targets
  evaluation_interval: 15s

scrape_configs:
  # Job para coletar métricas do Silver
  - job_name: 'silver_pipeline'
    static_configs:
      - targets: ['ingest:8000']
        labels:
          service: 'silver'
          layer: 'processing'
  
  # Job para coletar métricas do MinIO
  # ATENÇÃO: Substitua o bearer_token abaixo pelo token gerado no MinIO
  # Para gerar um novo token, execute:
  #docker exec -it minio mc alias set local http://localhost:9000 minioadmin minioadmin
  #docker exec -it minio mc admin prometheus generate local
  - job_name: 'minio'
    metrics_path: /minio/v2/metrics/cluster
    bearer_token: "eyJhbGciOiJIUzUxMiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJwcm9tZXRoZXVzIiwic3ViIjoibWluaW9hZG1pbiIsImV4cCI6NDkyNzI2NjEwMH0.UTbNfemH2468BZxTmru1Tv6Rt78OtmTbwan1k0B7TyuTr3cZPIlRXrYg7V-0JJjBdrZH-HkAhe2OKw2XP6ZABA"
    static_configs:
      - targets: ['minio:9000']
        labels:
          service: 'storage'